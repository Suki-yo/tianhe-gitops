apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: cookie-image-updater
  namespace: argocd
spec:
  commonUpdateSettings:
    pullSecret: "pullsecret:argocd/ghcr-creds"
  applicationRefs:
    - namePattern: cookie-api
      images:
        - alias: cookie-api
          imageName: ghcr.io/suki-yo/cookie-api
          commonUpdateSettings:
            updateStrategy: newest-build
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: cookie-web
      images:
        - alias: cookie-web
          imageName: ghcr.io/suki-yo/cookie-web
          commonUpdateSettings:
            updateStrategy: newest-build
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      branch: main
      writeBackTarget: "helmvalues:values.yaml"
